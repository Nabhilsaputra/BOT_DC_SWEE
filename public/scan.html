<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Absensi — TMSC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Palette — putih bersih dengan aksen teal "air kolam" & gold "prestasi" */
      --bg:          #ffffff;
      --surface:     #ffffff;
      --line:        #e7edf1;
      --line-soft:   #f0f4f6;

      --ink:         #142a38;
      --ink-soft:    #5b7484;
      --ink-faint:   #9fb0bc;

      --accent:      #0b7285;
      --accent-2:    #084c5c;
      --accent-soft: #e3f2f5;
      --accent-soft2:#cfeaef;

      --gold:        #b6862f;
      --gold-soft:   #f7efdc;

      --success:     #1c8c6e;
      --success-soft:#e3f5ee;
      --warn:        #b9802c;
      --warn-soft:   #fbf1df;
      --error:       #c0504d;
      --error-soft:  #fbeaea;

      --radius-sm: 12px;
      --radius:    18px;
      --radius-lg: 26px;

      --shadow-sm: 0 1px 2px rgba(15,42,56,0.05), 0 1px 1px rgba(15,42,56,0.03);
      --shadow-md: 0 10px 28px -10px rgba(15,42,56,0.14), 0 2px 8px -2px rgba(15,42,56,0.06);
      --shadow-lg: 0 24px 48px -18px rgba(15,42,56,0.20);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);

      --font-display: "Fraunces", Georgia, serif;
      --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient background — sangat halus, hanya sentuhan ─────────────── */
    .bg-glow {
      position: fixed;
      pointer-events: none;
      z-index: -1;
      border-radius: 50%;
      filter: blur(6px);
    }
    .bg-glow.glow-a {
      top: -130px; right: -110px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, var(--accent-soft) 0%, rgba(227,242,245,0) 70%);
      animation: breathe 9s ease-in-out infinite;
    }
    .bg-glow.glow-b {
      bottom: -120px; left: -100px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, var(--gold-soft) 0%, rgba(247,239,220,0) 70%);
      animation: breathe 11s ease-in-out infinite 1.5s;
    }
    @keyframes breathe {
      0%, 100% { opacity: .6;  transform: scale(1); }
      50%      { opacity: .95; transform: scale(1.08); }
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 36px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      width: 100%;
      max-width: 420px;
      padding: 28px 0 4px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo {
      width: 46px;
      height: 46px;
      background: linear-gradient(140deg, var(--accent), var(--accent-2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-md);
      animation: logoPop 0.55s var(--ease) both;
    }
    .header-logo svg { width: 24px; height: 24px; }
    @keyframes logoPop {
      from { opacity: 0; transform: scale(0.6) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg); }
    }
    .header-text { line-height: 1.25; }
    .header-text h1 {
      font-family: var(--font-display);
      font-size: 1.18rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.2px;
    }
    .header-text p {
      font-size: 0.78rem;
      color: var(--ink-soft);
      margin-top: 2px;
      transition: opacity 0.2s var(--ease);
    }

    /* ── Wave divider — signature element ──────────────────────────────── */
    .wave-divider {
      width: 100%;
      max-width: 420px;
      height: 18px;
      margin: 6px 0 22px;
      overflow: hidden;
    }
    .wave-divider path {
      fill: none;
      stroke: url(#waveGrad);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 6 11;
      animation: waveFlow 7s linear infinite;
    }
    @keyframes waveFlow { to { stroke-dashoffset: -136; } }

    /* ── Screen wrapper ──────────────────────────────────────────────────── */
    .screen {
      width: 100%;
      max-width: 420px;
      animation: screenIn 0.4s var(--ease);
    }
    .screen.hidden { display: none; }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(10px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Step indicator ──────────────────────────────────────────────────── */
    .steps {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 22px;
    }
    .step-dot {
      position: relative;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--line);
      transition: all 0.35s var(--ease);
    }
    .step-dot.active {
      background: var(--accent);
      width: 26px;
      border-radius: 5px;
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .step-dot.done { background: var(--success); }
    .steps-label {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--ink-faint);
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.25s var(--ease), border-color 0.25s var(--ease);
    }
    .card:hover { box-shadow: var(--shadow-md); }
    .card-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      color: var(--ink-soft);
      margin-bottom: 14px;
    }
    .card-label::before {
      content: "";
      width: 12px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ── Coach picker (pilih, tidak input manual) ─────────────────────────── */
    .coach-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }
    .coach-chip {
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px 4px 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      user-select: none;
      font-family: var(--font);
    }
    .coach-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--line-soft);
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      transition: all 0.2s var(--ease);
    }
    .coach-name {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: 0.1px;
    }
    .coach-chip:hover {
      border-color: var(--accent-soft2);
      transform: translateY(-1px);
    }
    .coach-chip.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .coach-chip.selected .coach-avatar { background: var(--accent); color: #fff; }
    .coach-chip.selected .coach-name   { color: var(--accent); }

    /* ── Kelas chips ─────────────────────────────────────────────────────── */
    .chips {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }
    .chip {
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 6px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      user-select: none;
    }
    .chip .chip-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-faint);
      margin-bottom: 7px;
      transition: color 0.2s var(--ease);
    }
    .chip .chip-icon svg { width: 22px; height: 22px; }
    .chip .chip-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--ink-soft);
      display: block;
      letter-spacing: 0.1px;
    }
    .chip:hover {
      border-color: var(--accent-soft2);
      transform: translateY(-1px);
    }
    .chip.selected { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

    .chip[data-kelas="Pemula"].selected {
      background: var(--accent-soft); border-color: var(--accent);
    }
    .chip[data-kelas="Pemula"].selected .chip-icon,
    .chip[data-kelas="Pemula"].selected .chip-label { color: var(--accent); }

    .chip[data-kelas="Lanjutan"].selected {
      background: var(--accent-soft2); border-color: var(--accent-2);
    }
    .chip[data-kelas="Lanjutan"].selected .chip-icon,
    .chip[data-kelas="Lanjutan"].selected .chip-label { color: var(--accent-2); }

    .chip[data-kelas="Prestasi"].selected {
      background: var(--gold-soft); border-color: var(--gold);
    }
    .chip[data-kelas="Prestasi"].selected .chip-icon,
    .chip[data-kelas="Prestasi"].selected .chip-label { color: var(--gold); }

    /* ── Primary button ──────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 0.96rem;
      font-weight: 700;
      font-family: var(--font);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.22s var(--ease);
      letter-spacing: 0.2px;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px -10px rgba(11,114,133,0.38);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      background: var(--line-soft);
      color: var(--ink-faint);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Session badge ───────────────────────────────────────────────────── */
    .session-badge {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 13px 15px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      box-shadow: var(--shadow-sm);
    }
    .session-info { line-height: 1.6; }
    .session-info .row {
      font-size: 0.82rem;
      color: var(--ink-soft);
    }
    .session-info .row strong { color: var(--ink); font-weight: 700; }
    .btn-change {
      background: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.74rem;
      font-weight: 600;
      font-family: var(--font);
      color: var(--ink-soft);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s var(--ease);
    }
    .btn-change:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    /* ── QR Reader & scan frame ──────────────────────────────────────────── */
    .scanner-frame {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--ink);
      box-shadow: var(--shadow-md);
    }
    #reader { width: 100%; }
    /* Override html5-qrcode default styling */
    #reader video { display: block; width: 100%; }
    #reader img { display: none; }

    .frame-corner {
      position: absolute;
      width: 22px; height: 22px;
      border: 2.5px solid #fff;
      opacity: 0.85;
      pointer-events: none;
      z-index: 2;
    }
    .frame-corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
    .frame-corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
    .frame-corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
    .frame-corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; border-radius: 0 0 6px 0; }

    .scan-line {
      position: absolute;
      left: 14%; right: 14%;
      top: 18%;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(94,222,255,0.95), rgba(255,255,255,0));
      border-radius: 2px;
      z-index: 2;
      pointer-events: none;
      animation: scanSweep 2.6s ease-in-out infinite;
    }
    @keyframes scanSweep {
      0%, 100% { top: 18%; opacity: 0.25; }
      50%      { top: 76%; opacity: 0.9; }
    }

    /* ── Result toast ────────────────────────────────────────────────────── */
    .result-box {
      margin-top: 14px;
      padding: 15px 16px;
      border-radius: var(--radius-sm);
      background: var(--line-soft);
      border: 1px solid var(--line);
      border-left: 4px solid var(--ink-faint);
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink-soft);
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s var(--ease);
      position: relative;
      overflow: hidden;
    }
    .result-box.state-ok {
      background: var(--success-soft);
      border-color: var(--success-soft);
      border-left-color: var(--success);
      color: var(--success);
    }
    .result-box.state-warn {
      background: var(--warn-soft);
      border-color: var(--warn-soft);
      border-left-color: var(--warn);
      color: var(--warn);
    }
    .result-box.state-err {
      background: var(--error-soft);
      border-color: var(--error-soft);
      border-left-color: var(--error);
      color: var(--error);
    }

    /* Ripple overlay */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(28,140,110,0.18);
      width: 0; height: 0;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: rippleGrow 0.6s ease-out forwards;
    }
    @keyframes rippleGrow {
      to { width: 600px; height: 600px; opacity: 0; }
    }

    /* ── Counter strip ───────────────────────────────────────────────────── */
    .counter-strip {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.76rem;
      color: var(--ink-faint);
    }
    .counter-strip .count {
      font-weight: 700;
      color: var(--success);
    }
    .counter-strip .last-id {
      font-family: "SF Mono", "Roboto Mono", monospace;
      font-size: 0.72rem;
      background: var(--line-soft);
      padding: 3px 8px;
      border-radius: 999px;
    }

    /* ── Footer note ─────────────────────────────────────────────────────── */
    .footer-note {
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin-top: 28px;
      font-size: 0.7rem;
      letter-spacing: 0.3px;
      color: var(--ink-faint);
    }

    /* ── Reduced motion ──────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .bg-glow, .wave-divider path, .scan-line, .header-logo { animation: none !important; }
      .screen { animation: none !important; }
      *, *::before, *::after { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="bg-glow glow-a"></div>
  <div class="bg-glow glow-b"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="17.2" cy="5.2" r="1.5" fill="#fff" stroke="none"/>
        <path d="M2 9c1.5-1.3 3-1.3 4.5 0s3 1.3 4.5 0 3-1.3 4.5 0 3 1.3 4.5 0"/>
        <path d="M2 14.3c1.5-1.3 3-1.3 4.5 0s3 1.3 4.5 0 3-1.3 4.5 0 3 1.3 4.5 0" opacity="0.55"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Absensi Klub TMSC</h1>
      <p id="headerSub">Pilih sesi sebelum mulai scan</p>
    </div>
  </div>

  <!-- Wave divider (signature element) -->
  <svg class="wave-divider" viewBox="0 0 420 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"  stop-color="#0b7285"/>
        <stop offset="50%" stop-color="#b6862f"/>
        <stop offset="100%" stop-color="#0b7285"/>
      </linearGradient>
    </defs>
    <path d="M0 9 C 35 1, 70 17, 105 9 C 140 1, 175 17, 210 9 C 245 1, 280 17, 315 9 C 350 1, 385 17, 420 9" />
  </svg>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- SCREEN 1 — Pilih Sesi                              -->
  <!-- ════════════════════════════════════════════════════ -->
  <div class="screen" id="screenSelect">

    <!-- Step dots -->
    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <span class="steps-label">Langkah 1 dari 2</span>
    </div>

    <!-- Coach -->
    <div class="card">
      <div class="card-label">Pilih Coach</div>
      <div class="coach-grid">
        <button type="button" class="coach-chip" data-coach="Ahmad">
          <span class="coach-avatar">A</span><span class="coach-name">Ahmad</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Akmal">
          <span class="coach-avatar">A</span><span class="coach-name">Akmal</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Diah">
          <span class="coach-avatar">D</span><span class="coach-name">Diah</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Dinda">
          <span class="coach-avatar">D</span><span class="coach-name">Dinda</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Geri">
          <span class="coach-avatar">G</span><span class="coach-name">Geri</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Gilang">
          <span class="coach-avatar">G</span><span class="coach-name">Gilang</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Giri">
          <span class="coach-avatar">G</span><span class="coach-name">Giri</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Nesya">
          <span class="coach-avatar">N</span><span class="coach-name">Nesya</span>
        </button>
        <button type="button" class="coach-chip" data-coach="Sadikin">
          <span class="coach-avatar">S</span><span class="coach-name">Sadikin</span>
        </button>
      </div>
    </div>

    <!-- Kelas -->
    <div class="card">
      <div class="card-label">Kelas</div>
      <div class="chips">
        <div class="chip" data-kelas="Pemula">
          <span class="chip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
              <path d="M12 3c-3.5 4-6 7.2-6 10.5A6 6 0 0012 19a6 6 0 006-5.5C18 10.2 15.5 7 12 3z"/>
            </svg>
          </span>
          <span class="chip-label">Pemula</span>
        </div>
        <div class="chip" data-kelas="Lanjutan">
          <span class="chip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <path d="M3 16c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
              <path d="M3 10c2-2 4-2 6 0s4 2 6 0 4-2 6 0" opacity="0.55"/>
            </svg>
          </span>
          <span class="chip-label">Lanjutan</span>
        </div>
        <div class="chip" data-kelas="Prestasi">
          <span class="chip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
              <circle cx="12" cy="14.3" r="5"/>
              <path d="M9 9.3L7 3M15 9.3l2-6.3"/>
            </svg>
          </span>
          <span class="chip-label">Prestasi</span>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="btnMulai" disabled>
      Mulai Scan Absensi →
    </button>

  </div>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- SCREEN 2 — Scanner                                 -->
  <!-- ════════════════════════════════════════════════════ -->
  <div class="screen hidden" id="screenScan">

    <!-- Step dots -->
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <span class="steps-label">Langkah 2 dari 2</span>
    </div>

    <!-- Session badge -->
    <div class="session-badge">
      <div class="session-info">
        <div class="row">Coach: <strong id="badgeCoach">—</strong></div>
        <div class="row">Kelas: <strong id="badgeKelas">—</strong></div>
      </div>
      <button class="btn-change" id="btnGanti">Ganti Sesi</button>
    </div>

    <!-- QR reader -->
    <div class="scanner-frame">
      <div id="reader"></div>
      <span class="frame-corner tl"></span>
      <span class="frame-corner tr"></span>
      <span class="frame-corner bl"></span>
      <span class="frame-corner br"></span>
      <div class="scan-line"></div>
    </div>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      Arahkan kamera ke QR Code atlet
    </div>

    <!-- Counter -->
    <div class="counter-strip">
      <span id="scanCount"></span>
      <span class="last-id" id="lastId"></span>
    </div>

  </div>

  <div class="footer-note">Tirtamulya Swimming Club &middot; Sistem Absensi Digital</div>

</div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  let coach         = "";
  let kelas         = "";
  let scanner       = null;
  let scannerActive = false;
  let countOk       = 0;
  let lastScan      = "";
  let lastScanMs    = 0;

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const coachChips  = document.querySelectorAll(".coach-chip");
  const btnMulai    = document.getElementById("btnMulai");
  const btnGanti    = document.getElementById("btnGanti");
  const screenSel   = document.getElementById("screenSelect");
  const screenScan  = document.getElementById("screenScan");
  const badgeCoach  = document.getElementById("badgeCoach");
  const badgeKelas  = document.getElementById("badgeKelas");
  const resultBox   = document.getElementById("resultBox");
  const scanCount   = document.getElementById("scanCount");
  const lastIdEl    = document.getElementById("lastId");
  const headerSub   = document.getElementById("headerSub");
  const chips       = document.querySelectorAll(".chip");

  // ── Coach selection ──────────────────────────────────────────────────────────
  coachChips.forEach(chip => {
    chip.addEventListener("click", () => {
      coachChips.forEach(c => c.classList.remove("selected"));
      chip.classList.add("selected");
      coach = chip.dataset.coach;
      validate();
    });
  });

  // ── Chip selection ───────────────────────────────────────────────────────────
  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      chips.forEach(c => c.classList.remove("selected"));
      chip.classList.add("selected");
      kelas = chip.dataset.kelas;
      validate();
    });
  });

  function validate() {
    btnMulai.disabled = !(coach && kelas);
  }

  // ── Screen transitions ───────────────────────────────────────────────────────
  btnMulai.addEventListener("click", () => {
    badgeCoach.textContent = coach;
    badgeKelas.textContent = kelas;
    headerSub.textContent  = `${coach} · ${kelas}`;
    countOk = 0;
    updateCounter();
    setResult("Arahkan kamera ke QR Code atlet", "idle");
    screenSel.classList.add("hidden");
    screenScan.classList.remove("hidden");
    if (!scannerActive) initScanner();
  });

  btnGanti.addEventListener("click", async () => {
    await stopScanner();
    document.getElementById("reader").innerHTML = "";
    kelas = "";
    chips.forEach(c => c.classList.remove("selected"));
    headerSub.textContent = "Pilih sesi sebelum mulai scan";
    screenScan.classList.add("hidden");
    screenSel.classList.remove("hidden");
    validate();
  });

  // ── Scanner ──────────────────────────────────────────────────────────────────
  function setResult(msg, state) {
    resultBox.textContent = msg;
    resultBox.className   = "result-box" + (state !== "idle" ? ` state-${state}` : "");
  }

  function triggerRipple() {
    const r = document.createElement("div");
    r.className = "ripple";
    resultBox.appendChild(r);
    r.addEventListener("animationend", () => r.remove());
  }

  function updateCounter() {
    scanCount.innerHTML = countOk > 0
      ? `<span class="count">✅ ${countOk}</span> atlet absen sesi ini`
      : "";
  }

  async function onScanSuccess(code) {
    const now = Date.now();
    if (code === lastScan && now - lastScanMs < 3000) return;
    lastScan  = code;
    lastScanMs = now;

    setResult(`Memproses…`, "warn");
    lastIdEl.textContent = code;

    try {
      const res = await fetch("/scan", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ code, coach, kelas }),
      });
      const data = await res.json();

      if (!data.success) {
        setResult("❌ " + data.message, "err");
      } else if (data.duplicate) {
        setResult("⚠️ " + data.message, "warn");
      } else {
        countOk++;
        updateCounter();
        setResult("✅ " + data.message, "ok");
        triggerRipple();
      }
    } catch {
      setResult("❌ Gagal menghubungi server.", "err");
    }
  }

  function initScanner() {
    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
      .then(cameras => {
        if (!cameras || cameras.length === 0) {
          setResult("❌ Kamera tidak ditemukan.", "err");
          return;
        }

        console.log("Detected cameras:", cameras);

        // 🔥 PILIH KAMERA YANG BUKAN OBS
        let cam =
          cameras.find(c =>
            c.label && c.label.toLowerCase().includes("back")
          ) ||
          cameras.find(c =>
            c.label && c.label.toLowerCase().includes("belakang")
          ) ||
          cameras.find(c =>
            c.label && c.label.toLowerCase().includes("environment")
          ) ||
          cameras[cameras.length - 1];

        return scanner.start(
          cam.id,
          {
            fps: 10,
            qrbox: { width: 240, height: 240 },
            videoConstraints: {
              deviceId: cam.id
            }
          },
          onScanSuccess
        ).then(() => {
          scannerActive = true;
        });
      })
      .catch(err => {
        console.error(err);
        setResult("❌ Kamera error: " + err.message, "err");
      });
  }

  async function stopScanner() {
    if (scanner && scannerActive) {
      try { await scanner.stop(); } catch (_) {}
      scanner       = null;
      scannerActive = false;
    }
  }
</script>
</body>
</html>
