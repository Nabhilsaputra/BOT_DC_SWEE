<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Absensi — Klub Renang</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0f1e;
      --surface:   #111827;
      --surface2:  #1a2236;
      --border:    #1e2d45;
      --accent:    #0ea5e9;
      --accent-dim:#0c4a6e;
      --success:   #10b981;
      --warn:      #f59e0b;
      --error:     #f43f5e;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --muted2:    #94a3b8;

      --radius-sm: 10px;
      --radius:    16px;
      --radius-lg: 22px;

      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 40px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      width: 100%;
      max-width: 420px;
      padding: 24px 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .header-text { line-height: 1.2; }
    .header-text h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .header-text p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Screen wrapper ──────────────────────────────────────────────────── */
    .screen {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.25s ease;
    }
    .screen.hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Step indicator ──────────────────────────────────────────────────── */
    .steps {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }
    .step-dot.active {
      background: var(--accent);
      width: 24px;
      border-radius: 4px;
    }
    .step-dot.done { background: var(--success); }
    .steps-label {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Coach input ─────────────────────────────────────────────────────── */
    .input-field {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
    }
    .input-field::placeholder { color: var(--muted); }

    /* ── Kelas chips ─────────────────────────────────────────────────────── */
    .chips {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .chip .chip-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .chip .chip-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted2);
      display: block;
    }
    .chip:hover {
      border-color: var(--accent);
    }
    .chip.selected {
      background: rgba(14,165,233,0.1);
      border-color: var(--accent);
    }
    .chip.selected .chip-label { color: var(--accent); }

    /* ── Primary button ──────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--font);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.2px;
    }
    .btn-primary:hover:not(:disabled) {
      background: #38bdf8;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(14,165,233,0.3);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Session badge ───────────────────────────────────────────────────── */
    .session-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .session-info { line-height: 1.55; }
    .session-info .row {
      font-size: 0.82rem;
      color: var(--muted2);
    }
    .session-info .row strong { color: var(--text); font-weight: 600; }
    .btn-change {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-family: var(--font);
      color: var(--muted2);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.18s;
    }
    .btn-change:hover { border-color: var(--accent); color: var(--accent); }

    /* ── QR Reader ───────────────────────────────────────────────────────── */
    #reader {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid var(--border);
      background: var(--surface);
    }
    /* Override html5-qrcode default styling */
    #reader video { border-radius: var(--radius) !important; }
    #reader img { display: none; }

    /* ── Result toast ────────────────────────────────────────────────────── */
    .result-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .result-box.state-ok {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.4);
      color: #6ee7b7;
    }
    .result-box.state-warn {
      background: rgba(245,158,11,0.08);
      border-color: rgba(245,158,11,0.4);
      color: #fcd34d;
    }
    .result-box.state-err {
      background: rgba(244,63,94,0.08);
      border-color: rgba(244,63,94,0.4);
      color: #fda4af;
    }

    /* Ripple overlay */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(16,185,129,0.25);
      width: 0; height: 0;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: rippleGrow 0.6s ease-out forwards;
    }
    @keyframes rippleGrow {
      to { width: 600px; height: 600px; opacity: 0; }
    }

    /* ── Counter strip ───────────────────────────────────────────────────── */
    .counter-strip {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .counter-strip .count {
      font-weight: 700;
      color: var(--success);
    }
    .counter-strip .last-id {
      font-family: monospace;
      font-size: 0.72rem;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🏊</div>
    <div class="header-text">
      <h1>Absensi Klub Renang</h1>
      <p id="headerSub">Pilih sesi sebelum mulai scan</p>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- SCREEN 1 — Pilih Sesi                              -->
  <!-- ════════════════════════════════════════════════════ -->
  <div class="screen" id="screenSelect">

    <!-- Step dots -->
    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <span class="steps-label">Langkah 1 dari 2</span>
    </div>

    <!-- Coach -->
    <div class="card">
      <div class="card-label">👤 Nama Coach</div>
      <input
        id="coachInput"
        class="input-field"
        type="text"
        placeholder="Ketik nama coach yang bertugas..."
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"
      />
    </div>

    <!-- Kelas -->
    <div class="card">
      <div class="card-label">🎽 Kelas</div>
      <div class="chips">
        <div class="chip" data-kelas="Pemula">
          <span class="chip-icon">🟢</span>
          <span class="chip-label">Pemula</span>
        </div>
        <div class="chip" data-kelas="Lanjutan">
          <span class="chip-icon">🔵</span>
          <span class="chip-label">Lanjutan</span>
        </div>
        <div class="chip" data-kelas="Prestasi">
          <span class="chip-icon">🏆</span>
          <span class="chip-label">Prestasi</span>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="btnMulai" disabled>
      Mulai Scan Absensi →
    </button>

  </div>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- SCREEN 2 — Scanner                                 -->
  <!-- ════════════════════════════════════════════════════ -->
  <div class="screen hidden" id="screenScan">

    <!-- Step dots -->
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <span class="steps-label">Langkah 2 dari 2</span>
    </div>

    <!-- Session badge -->
    <div class="session-badge">
      <div class="session-info">
        <div class="row">Coach: <strong id="badgeCoach">—</strong></div>
        <div class="row">Kelas: <strong id="badgeKelas">—</strong></div>
      </div>
      <button class="btn-change" id="btnGanti">Ganti Sesi</button>
    </div>

    <!-- QR reader -->
    <div id="reader"></div>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      Arahkan kamera ke QR Code atlet
    </div>

    <!-- Counter -->
    <div class="counter-strip">
      <span id="scanCount"></span>
      <span class="last-id" id="lastId"></span>
    </div>

  </div>

</div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  let coach         = "";
  let kelas         = "";
  let scanner       = null;
  let scannerActive = false;
  let countOk       = 0;
  let lastScan      = "";
  let lastScanMs    = 0;

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const coachInput  = document.getElementById("coachInput");
  const btnMulai    = document.getElementById("btnMulai");
  const btnGanti    = document.getElementById("btnGanti");
  const screenSel   = document.getElementById("screenSelect");
  const screenScan  = document.getElementById("screenScan");
  const badgeCoach  = document.getElementById("badgeCoach");
  const badgeKelas  = document.getElementById("badgeKelas");
  const resultBox   = document.getElementById("resultBox");
  const scanCount   = document.getElementById("scanCount");
  const lastIdEl    = document.getElementById("lastId");
  const headerSub   = document.getElementById("headerSub");
  const chips       = document.querySelectorAll(".chip");

  // ── Chip selection ───────────────────────────────────────────────────────────
  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      chips.forEach(c => c.classList.remove("selected"));
      chip.classList.add("selected");
      kelas = chip.dataset.kelas;
      validate();
    });
  });

  coachInput.addEventListener("input", () => {
    coach = coachInput.value.trim();
    validate();
  });

  function validate() {
    btnMulai.disabled = !(coach && kelas);
  }

  // ── Screen transitions ───────────────────────────────────────────────────────
  btnMulai.addEventListener("click", () => {
    badgeCoach.textContent = coach;
    badgeKelas.textContent = kelas;
    headerSub.textContent  = `${coach} · ${kelas}`;
    countOk = 0;
    updateCounter();
    setResult("Arahkan kamera ke QR Code atlet", "idle");
    screenSel.classList.add("hidden");
    screenScan.classList.remove("hidden");
    if (!scannerActive) initScanner();
  });

  btnGanti.addEventListener("click", async () => {
    await stopScanner();
    document.getElementById("reader").innerHTML = "";
    kelas = "";
    chips.forEach(c => c.classList.remove("selected"));
    headerSub.textContent = "Pilih sesi sebelum mulai scan";
    screenScan.classList.add("hidden");
    screenSel.classList.remove("hidden");
    validate();
  });

  // ── Scanner ──────────────────────────────────────────────────────────────────
  function setResult(msg, state) {
    resultBox.textContent = msg;
    resultBox.className   = "result-box" + (state !== "idle" ? ` state-${state}` : "");
  }

  function triggerRipple() {
    const r = document.createElement("div");
    r.className = "ripple";
    resultBox.appendChild(r);
    r.addEventListener("animationend", () => r.remove());
  }

  function updateCounter() {
    scanCount.innerHTML = countOk > 0
      ? `<span class="count">✅ ${countOk}</span> atlet absen sesi ini`
      : "";
  }

  async function onScanSuccess(code) {
    const now = Date.now();
    if (code === lastScan && now - lastScanMs < 3000) return;
    lastScan  = code;
    lastScanMs = now;

    setResult(`Memproses…`, "warn");
    lastIdEl.textContent = code;

    try {
      const res = await fetch("/scan", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ code, coach, kelas }),
      });
      const data = await res.json();

      if (!data.success) {
        setResult("❌ " + data.message, "err");
      } else if (data.duplicate) {
        setResult("⚠️ " + data.message, "warn");
      } else {
        countOk++;
        updateCounter();
        setResult("✅ " + data.message, "ok");
        triggerRipple();
      }
    } catch {
      setResult("❌ Gagal menghubungi server.", "err");
    }
  }

  function initScanner() {
    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
      .then(cameras => {
        if (!cameras || cameras.length === 0) {
          setResult("❌ Kamera tidak ditemukan.", "err");
          return;
        }

        console.log("Detected cameras:", cameras);

        // 🔥 PILIH KAMERA YANG BUKAN OBS
        let cam =
          cameras.find(c =>
            c.label && c.label.toLowerCase().includes("back")
          ) ||
          cameras.find(c =>
            c.label && c.label.toLowerCase().includes("belakang")
          ) ||
          cameras.find(c =>
            c.label && c.label.toLowerCase().includes("environment")
          ) ||
          cameras[cameras.length - 1];

        return scanner.start(
          cam.id,
          {
            fps: 10,
            qrbox: { width: 240, height: 240 },
            videoConstraints: {
              deviceId: cam.id
            }
          },
          onScanSuccess
        ).then(() => {
          scannerActive = true;
        });
      })
      .catch(err => {
        console.error(err);
        setResult("❌ Kamera error: " + err.message, "err");
      });
  }

  async function stopScanner() {
    if (scanner && scannerActive) {
      try { await scanner.stop(); } catch (_) {}
      scanner       = null;
      scannerActive = false;
    }
  }
</script>
</body>
</html>
